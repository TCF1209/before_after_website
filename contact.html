<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | DuoCode Technology</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0a1628; color: #e0e0e0; font-family: 'Inter', sans-serif;
            overflow: hidden; position: relative;
        }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .error-container {
            position: relative; z-index: 1; text-align: center; padding: 40px;
            background: rgba(10, 22, 40, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 24px;
            max-width: 550px; box-shadow: 0 0 60px rgba(0, 212, 170, 0.1);
        }
        .error-code {
            font-family: 'Cinzel', serif; font-size: 120px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #00D4AA 0%, #FFD700 50%, #00D4AA 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 30px rgba(0, 212, 170, 0.3));
        }
        @keyframes shine { to { background-position: 200% center; } }
        .error-title {
            font-family: 'Cinzel', serif; font-size: 28px; color: #fff;
            margin: 16px 0 12px;
        }
        .error-msg { font-size: 16px; color: #999; line-height: 1.6; margin-bottom: 32px; }
        .back-btn {
            display: inline-block; padding: 14px 40px; border-radius: 8px; font-size: 16px; font-weight: 600;
            text-decoration: none; color: #0a1628;
            background: linear-gradient(135deg, #00D4AA, #00e6b8);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .back-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,215,0,0.3), transparent);
            transform: rotate(45deg); animation: btnShine 2.5s infinite;
        }
        @keyframes btnShine { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
        .back-btn:hover { box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); transform: scale(1.05); }
        .logo { margin-bottom: 20px; }
        .logo img { height: 50px; filter: drop-shadow(0 0 15px rgba(0, 212, 170, 0.5)); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="error-container">
        <div class="logo"><img src="logo_Duo_Code-remove-background.com.png" alt="DuoCode"></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-msg">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789<>/{}[]()=+-*&^%$#@!~|\\;:.,?アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const fontSize = 16;
        const columns = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const count = Math.ceil(canvas.width / fontSize);
            columns.length = 0;
            for (let i = 0; i < count; i++) {
                columns.push({ x: i * fontSize, drops: [], nextSpawn: Math.random() * 60 });
            }
        }

        function spawnDrop(col) {
            const speed = Math.random() * 2 + 1.5;
            const length = Math.floor(Math.random() * 25) + 8;
            const isTeal = Math.random() > 0.25;
            const dropChars = [];
            for (let j = 0; j < length; j++) dropChars.push(chars[Math.floor(Math.random() * chars.length)]);
            col.drops.push({ y: -fontSize * length, speed, chars: dropChars, length, isTeal, changeTimer: 0 });
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 22, 40, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < columns.length; i++) {
                const col = columns[i];
                col.nextSpawn--;
                if (col.nextSpawn <= 0) { spawnDrop(col); col.nextSpawn = Math.random() * 80 + 20; }

                for (let d = col.drops.length - 1; d >= 0; d--) {
                    const drop = col.drops[d];
                    drop.y += drop.speed;
                    drop.changeTimer++;
                    if (drop.changeTimer > 3) {
                        drop.changeTimer = 0;
                        drop.chars[Math.floor(Math.random() * drop.length)] = chars[Math.floor(Math.random() * chars.length)];
                    }
                    for (let j = 0; j < drop.length; j++) {
                        const charY = drop.y + j * fontSize;
                        if (charY < -fontSize || charY > canvas.height + fontSize) continue;
                        const progress = j / drop.length;
                        if (j === 0) {
                            ctx.fillStyle = drop.isTeal ? 'rgba(255,255,255,0.95)' : 'rgba(255,215,0,1)';
                            ctx.shadowColor = drop.isTeal ? '#00D4AA' : '#FFD700';
                            ctx.shadowBlur = 15;
                        } else if (j < 3) {
                            const a = 0.9 - progress * 0.3;
                            ctx.fillStyle = drop.isTeal ? `rgba(0,255,210,${a})` : `rgba(255,215,0,${a})`;
                            ctx.shadowBlur = 0;
                        } else {
                            const a = Math.max(0, 0.6 - progress * 0.7);
                            ctx.fillStyle = drop.isTeal ? `rgba(0,180,140,${a})` : `rgba(200,170,0,${a})`;
                            ctx.shadowBlur = 0;
                        }
                        ctx.fillText(drop.chars[j], col.x, charY);
                    }
                    ctx.shadowBlur = 0;
                    if (drop.y > canvas.height + fontSize * drop.length) col.drops.splice(d, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        ctx.fillStyle = '#0a1628';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        animate();
    </script>
</body>
</html>
