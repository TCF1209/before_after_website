<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | DuoCode Technology</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #e0e0e0; color: #555; font-family: Arial, 'Times New Roman', serif;
        }
        .error-container {
            text-align: center; padding: 40px;
            background: #d5d5d5; border: 1px solid #bbb;
            max-width: 500px;
        }
        .logo { margin-bottom: 20px; }
        .logo img { height: 50px; filter: grayscale(100%); }
        .error-code { font-size: 100px; font-weight: bold; color: #888; line-height: 1; }
        .error-title { font-size: 24px; color: #555; margin: 12px 0 8px; }
        .error-msg { font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 28px; }
        .back-btn {
            display: inline-block; padding: 12px 28px;
            border: 1px solid #bbb; background: #d0d0d0; color: #555;
            font-size: 15px; text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo"><img src="logo_Duo_Code-remove-background.com.png" alt="DuoCode"></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-msg">Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>
</body>
</html>
